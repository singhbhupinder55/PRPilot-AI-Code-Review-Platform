spring:
  application:
    name: notification-service

  flyway:
    ignore-migration-patterns: "*:Missing"

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:prpilot}
    username: ${POSTGRES_USER:prpilot}
    password: ${POSTGRES_PASSWORD:prpilot_dev}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.use.type.headers: false
        spring.json.value.default.type: dev.prpilot.notification.model.ReviewCompletedEvent

server:
  port: 8084

prpilot:
  kafka:
    topics:
      reviews-completed: reviews.completed
  github:
    token: ${GITHUB_TOKEN_PRPILOT:}
    api-url: https://api.github.com

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    dev.prpilot: DEBUG
